<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pastelería XSCake – Catálogo</title>

    <style>
        body {
            font-family: "Trebuchet MS", Arial, sans-serif;
            background-color: #fdf6f0;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #a6dda4;
            padding: 30px;
            text-align: center;
            border-bottom: 8px dashed #f4a261;
        }

        header h1 {
            margin: 0;
            font-size: 3rem;
            color: #2f5d2f;
            font-weight: bold;
        }

        header p {
            margin: 5px 0 0 0;
            font-size: 1.2rem;
            color: #3d6b3d;
        }

        .banner {
            background-color: #f1fff1;
            width: 80%;
            margin: 30px auto;
            padding: 25px;
            border: 6px dashed #f4a261;
            border-radius: 15px;
            text-align: center;
        }

        .banner h2 {
            font-size: 2.5rem;
            color: #2f5d2f;
            margin-bottom: 10px;
        }

        .banner p {
            color: #555;
            font-size: 1.1rem;
            width: 80%;
            margin: 0 auto 20px auto;
        }

        .banner img {
            width: 150px;
            margin-top: 10px;
        }

        iframe {
            width: 90%;
            height: 900px;
            border: none;
            display: block;
            margin: 20px auto;
        }
    </style>
</head>

<body>

    <header>
        <h1>Pastelería XSCake</h1>
        <p>Delicias artesanales en Sevilla</p>
    </header>

    <section class="banner">
        <h2>Catálogo de Productos</h2>
        <p>
            Descubre nuestras tartas, bollería y repostería elaboradas con ingredientes frescos
            y mucho cariño. ¡Todo listo para endulzar tu día!
        </p>

        <!-- Ilustración del pastelito de fresa -->
        <img src="pastelito-fresa.png" alt="Pastelito de fresa adorable">
    </section>

    <!-- Catálogo generado desde el XML + XSLT -->
    <iframe src="pasteleria.xml"></iframe>

</body>
</html>
